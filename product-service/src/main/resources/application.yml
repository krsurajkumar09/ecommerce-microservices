server:
  port: 8081

spring:
  application:
    name: PRODUCT-SERVICE

  datasource:
    url: jdbc:mysql://localhost:3306/product_db
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

  # ✅ Use simple cache for now (no Redis dependency)
  cache:
    type: simple

# ❌ Enable Redis ONLY if running in Docker
#  data:
#    redis:
#      host: localhost
#      port: 6379

# ❌ Enable only if Zipkin is running
#  zipkin:
#    base-url: http://localhost:9411

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

